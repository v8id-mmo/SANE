name: Deploy docs
on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "Publish/tutorials/C64/docs-examples/**"
      - ".github/workflows/deploy-docs.yml"
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install mkdocs-material
      - name: Copy example sources into docs assets
        run: |
          mkdir -p Publish/tutorials/C64/docs-examples
          mkdir -p docs/assets/examples
          cp -r Publish/tutorials/C64/docs-examples/. docs/assets/examples/
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
