site_name: SANE / TRSE Documentation
site_description: Language reference and examples for SANE, a TRSE-compatible Pascal-like compiler for the Commodore 64.
repo_url: https://github.com/v8id-mmo/SANE
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
plugins:
  - search
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
  - Project Goals: goals.md
  - Getting Started: getting-started.md
  - Known Bugs: known-bugs.md
  - Reference:
      - Keywords:
          - Overview: reference/keywords/index.md
          - absolute: reference/keywords/absolute.md
          - "@addcpmheader": reference/keywords/addcpmheader.md
          - "@addemulatorparam": reference/keywords/addemulatorparam.md
          - "@addmonitorcommand": reference/keywords/addmonitorcommand.md
          - asm: reference/keywords/asm.md
          - assembler: reference/keywords/assembler.md
          - at: reference/keywords/at.md
          - begin: reference/keywords/begin.md
          - "@bin2inc": reference/keywords/bin2inc.md
          - break: reference/keywords/break.md
          - buildsinetable: reference/keywords/buildsinetable.md
          - buildtable: reference/keywords/buildtable.md
          - buildtable2d: reference/keywords/buildtable2d.md
          - case: reference/keywords/case.md
          - "@compress": reference/keywords/compress.md
          - compressed: reference/keywords/compressed.md
          - const: reference/keywords/const.md
          - continue: reference/keywords/continue.md
          - "@copyfile": reference/keywords/copyfile.md
          - "@define": reference/keywords/define.md
          - "@deletefile": reference/keywords/deletefile.md
          - do: reference/keywords/do.md
          - "@donotprefix": reference/keywords/donotprefix.md
          - "@donotprefixunit": reference/keywords/donotprefixunit.md
          - "@donotremove": reference/keywords/donotremove.md
          - else: reference/keywords/else.md
